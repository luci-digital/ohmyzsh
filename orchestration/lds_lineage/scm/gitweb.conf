# gitweb.conf — sovereign read-only mirror
# LDS: 700.080 | IPv6: 2602:F674:0000:0700::80 | 528 Hz (Veritas)
# Genesis Bond: ACTIVE @ 741 Hz
# Reference: https://git-scm.com/docs/gitweb.conf
#
# Mounted by the gitweb container or proxied by Caddy from the
# luci-vcs `web` module. Read-only public surface alongside Gogs.

# ── Project root ──────────────────────────────────────────────────────────────
# Where bare repositories live on disk — shared with Gogs volume.
$projectroot = "/var/lib/gogs/repositories";

# ── Branding ──────────────────────────────────────────────────────────────────
$site_name = "LuciVerse Sovereign SCM · 528 Hz";
$site_header = "luciverse-gitweb-header.html";
$site_footer = "luciverse-gitweb-footer.html";
$home_link_str = "lucidigital.io";

# ── URL composition ───────────────────────────────────────────────────────────
# Served at gogs.lucidigital.io/gitweb behind Caddy.
$my_uri = "/gitweb";
$home_link = "/gitweb";

# ── Repo description ──────────────────────────────────────────────────────────
# Falls back to .git/description; LuciVerse repos should set this to the
# LDS tier (e.g. "LDS 580.0 — Sentropy QMU substrate").
$default_projects_order = "age";

# ── Categories ────────────────────────────────────────────────────────────────
# Mirror the LDS tier layout — projects are auto-bucketed by their tier.
@git_base_url_list = ("http://gogs.lucidigital.io");

# ── Features ──────────────────────────────────────────────────────────────────
$feature{'pathinfo'}{'default'} = [1];
$feature{'blame'}{'default'} = [1];
$feature{'highlight'}{'default'} = [1];
$feature{'snapshot'}{'default'} = ['tar.gz', 'zip'];

# Patch & search enabled, but no remote heads — Gogs handles writes.
$feature{'patches'}{'default'} = [16];
$feature{'search'}{'default'} = [1];

# ── Strictly read-only ────────────────────────────────────────────────────────
# No clone-over-HTTP from gitweb — point users at Gogs/Coder for that.
$feature{'remote_heads'}{'default'} = [0];

# ── Veritas attestation header ────────────────────────────────────────────────
# Sets X-LuciVerse-Frequency on every response so downstream agents can
# verify the source was the Veritas-tier mirror.
$ENV{'HTTP_X_LUCIVERSE_FREQUENCY'} = '528';
$ENV{'HTTP_X_LDS_TIER'} = '700.080';
